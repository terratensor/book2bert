name: tiny_bert_streaming

model:
  vocab_size: 50000
  hidden_size: 384
  num_layers: 6
  num_heads: 12
  intermediate_size: 1536
  max_position: 512
  dropout: 0.1

training:
  batch_size: 16
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5
  weight_decay: 0.01
  num_epochs: 10  # начнем с 5 эпох

data:
  mlm_probability: 0.15