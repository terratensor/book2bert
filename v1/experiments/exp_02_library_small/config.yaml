name: library_small

model:
  vocab_size: 80000  # будет уточнено после тестов
  hidden_size: 512
  num_layers: 8
  num_heads: 16
  intermediate_size: 2048
  max_position: 512
  dropout: 0.1

training:
  batch_size: 12
  gradient_accumulation_steps: 2  # эффективный batch = 24
  learning_rate: 5.0e-5
  weight_decay: 0.01
  num_epochs: 10

data:
  mlm_probability: 0.15