model:
  vocab_size: 30000
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  intermediate_size: 3072
  max_position: 512
  dropout: 0.1

training:
  batch_size: 8
  gradient_accumulation_steps: 2  # эффективный batch_size = 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  num_epochs: 10

data:
  mlm_probability: 0.15